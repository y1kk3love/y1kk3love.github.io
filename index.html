<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>y1kk3love</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e4dd;
      --muted: #6b6762;
      --accent: #c8f060;
      --accent-dim: rgba(200, 240, 96, 0.08);
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-weight: 300;
      font-size: 14px;
      line-height: 1.7;
      min-height: 100vh;
      cursor: default;
    }

    /* ── Layout ── */
    .wrapper {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 32px;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      background: rgba(14, 14, 14, 0.85);
      backdrop-filter: blur(12px);
    }

    nav .wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 18px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--text); }

    /* ── Hero ── */
    #hero {
      padding-top: 56px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200,240,96,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      padding: 80px 0;
    }

    .hero-tag {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(200, 240, 96, 0.3);
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.1s forwards;
    }

    .hero-name {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(48px, 8vw, 88px);
      line-height: 1;
      letter-spacing: -2px;
      color: var(--text);
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }

    .hero-role {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(20px, 4vw, 32px);
      color: var(--muted);
      margin-bottom: 32px;
      letter-spacing: -0.5px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.3s forwards;
    }

    .hero-desc {
      max-width: 520px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.9;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.4s forwards;
    }

    .hero-desc p {
      /* 여기에 한 줄 소개를 채워 넣으세요 */
      color: var(--muted);
    }

    .hero-cta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.5s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #0e0e0e;
      font-weight: 500;
    }

    .btn-primary:hover {
      background: #d8ff70;
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--text);
      color: var(--text);
    }

    /* ── Section base ── */
    section {
      padding: 96px 0;
      border-top: 1px solid var(--border);
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .section-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: -1px;
      color: var(--text);
      margin-bottom: 48px;
    }

    /* ── About ── */
    #about .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .about-text p {
      color: var(--muted);
      margin-bottom: 16px;
      /* 자기소개 내용을 채워 넣으세요 */
    }

    .about-stats {
      display: flex;
      flex-direction: column;
      gap: 1px;
      border: 1px solid var(--border);
    }

    .stat-item {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-item:last-child { border-bottom: none; }

    .stat-label { color: var(--muted); font-size: 12px; }
    .stat-value {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 20px;
      color: var(--accent);
    }

    /* ── Skills ── */
    #skills .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1px;
      border: 1px solid var(--border);
      background: var(--border);
    }

    .skill-card {
      background: var(--surface);
      padding: 24px;
      transition: background 0.2s;
    }

    .skill-card:hover { background: var(--accent-dim); }

    .skill-category {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .skill-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .skill-list li {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .skill-list li::before {
      content: '—';
      color: var(--border);
      font-size: 10px;
    }

    /* ── Projects ── */
    #projects .project-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      border: 1px solid var(--border);
      background: var(--border);
    }

    .project-item {
      background: var(--surface);
      padding: 32px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: start;
      transition: background 0.2s;
    }

    .project-item:hover { background: var(--accent-dim); }

    .project-name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 18px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .project-desc {
      color: var(--muted);
      font-size: 13px;
      max-width: 480px;
      /* 프로젝트 설명을 채워 넣으세요 */
    }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 16px;
    }

    .tag {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 2px;
    }

    .project-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 2px;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .project-link:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── Contact ── */
    #contact {
      padding-bottom: 120px;
    }

    .contact-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: start;
    }

    .contact-desc {
      color: var(--muted);
      line-height: 1.9;
      /* 연락처 안내 문구를 채워 넣으세요 */
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 1px;
      border: 1px solid var(--border);
      background: var(--border);
    }

    .contact-link-item {
      background: var(--surface);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-decoration: none;
      transition: background 0.2s;
    }

    .contact-link-item:hover { background: var(--accent-dim); }

    .contact-link-label { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; }
    .contact-link-value { color: var(--text); font-size: 13px; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
    }

    footer .wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .wrapper { padding: 0 20px; }
      .nav-links { display: none; }
      #about .about-grid { grid-template-columns: 1fr; }
      .contact-inner { grid-template-columns: 1fr; }
      .project-item { grid-template-columns: 1fr; }
    }
  </style>
</head>
